<button class="back" routerLink="/registro">
← Volver
</button>

<div class="container">

  <div class="form">

    <div class="logo">
      <img src="/assets/movify.jpg">
      <span>MoviFY</span>
    </div>

    <h2>Registro Conductor</h2>
    <p class="subtitle">
      Gana dinero realizando viajes y domicilios
    </p>

    <input placeholder="Nombre completo">
    <input placeholder="Correo electrónico">
    <input type="password" placeholder="Contraseña">
    <input type="password" placeholder="Confirmar contraseña">

    <input placeholder="Placa de la moto">
    <input placeholder="Modelo de la moto">

    <div class="divider"></div>
    <h3 class="section-title">Documentos requeridos</h3>

    <div class="file-group">
      <label>Tarjeta de propiedad</label>
      <input type="file" accept=".pdf,image/*">
    </div>

    <div class="file-group">
      <label>Licencia de conducción</label>
      <input type="file" accept=".pdf,image/*">
    </div>

    <div class="file-group">
      <label>SOAT</label>
      <input type="file" accept=".pdf,image/*">
    </div>

    <div class="file-group">
      <label>Tecnomecánica</label>
      <input type="file" accept=".pdf,image/*">
    </div>

    <button class="btn">
      Crear cuenta de conductor
    </button>

    <p class="login">
      ¿Ya tienes cuenta?
      <span routerLink="/login">Iniciar sesión</span>
    </p>

  </div>

</div>
