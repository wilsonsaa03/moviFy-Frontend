<div class="split-layout">

  <div class="left-panel">
    <div class="left-overlay"></div>
  </div>

  <div class="right-panel">

    <button class="back-btn" routerLink="/registro">← Volver</button>

    <div class="form-logo">
      <img src="/assets/logo transparente.png" alt="MoviFY">
      <span class="brand">Movi<span>FY</span></span>
    </div>

    <h2>Registro Administrador</h2>
    <p class="subtitle">Gestiona usuarios, conductores y servicios</p>

    <div class="form-fields">

      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" placeholder="Nombre completo"
               [(ngModel)]="datos.nombre">
      </div>

      <div class="input-wrap">
        <span class="icon">✉️</span>
        <input type="email" placeholder="Correo electrónico"
               [(ngModel)]="datos.correo">
      </div>

      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input [type]="mostrarPassword ? 'text' : 'password'"
               placeholder="Contraseña"
               [(ngModel)]="datos.password">
        <span class="eye-icon" (click)="mostrarPassword = !mostrarPassword">
          {{ mostrarPassword ? '🙈' : '👁' }}
        </span>
      </div>

      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input [type]="mostrarConfirmar ? 'text' : 'password'"
               placeholder="Confirmar contraseña"
               [(ngModel)]="confirmar">
        <span class="eye-icon" (click)="mostrarConfirmar = !mostrarConfirmar">
          {{ mostrarConfirmar ? '🙈' : '👁' }}
        </span>
      </div>

      <div class="input-wrap">
        <span class="icon">🛡️</span>
        <input type="text" placeholder="Código administrador"
               [(ngModel)]="datos.codigoAdmin">
      </div>

      <p *ngIf="error" style="color:#dc2626;font-size:13px;margin:4px 0;">{{ error }}</p>
      <p *ngIf="exito" style="color:#16a34a;font-size:13px;margin:4px 0;">{{ exito }}</p>

      <button class="btn-submit" (click)="registrar()" [disabled]="cargando">
        <span>👤+</span>
        {{ cargando ? 'Registrando...' : 'Crear cuenta administrador' }}
      </button>

    </div>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión ›</a>
    </p>

  </div>
</div>
