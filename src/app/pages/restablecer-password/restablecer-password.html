<div class="recuperar-wrapper">

  <div class="lado-izquierdo">
    <img src="/assets/fondologin.jpeg" class="fondo-img">
  </div>

  <div class="lado-derecho">
    <div class="form-card">

      <img src="/assets/movify.jpg" class="form-logo">
      <h1>Nueva contraseña</h1>
      <p class="subtitle">Crea una contraseña segura para tu cuenta.</p>

      <!-- FORMULARIO -->
      <div *ngIf="!exito">

        <div class="input-group">
          <span class="icon">🔒</span>
          <input
            [type]="mostrarPassword ? 'text' : 'password'"
            placeholder="Nueva contraseña"
            [(ngModel)]="password"
          >
          <span class="toggle" (click)="mostrarPassword = !mostrarPassword">
            {{ mostrarPassword ? '🙈' : '👁️' }}
          </span>
        </div>
        <p class="msg-error" *ngIf="errores.password">❌ {{ errores.password }}</p>

        <div class="input-group">
          <span class="icon">🔒</span>
          <input
            [type]="mostrarConfirmar ? 'text' : 'password'"
            placeholder="Confirmar contraseña"
            [(ngModel)]="confirmar"
          >
          <span class="toggle" (click)="mostrarConfirmar = !mostrarConfirmar">
            {{ mostrarConfirmar ? '🙈' : '👁️' }}
          </span>
        </div>
        <p class="msg-error" *ngIf="errores.confirmar">❌ {{ errores.confirmar }}</p>

        <p class="msg-error" *ngIf="error">❌ {{ error }}</p>

        <button class="btn-accion" (click)="restablecer()" [disabled]="cargando">
          {{ cargando ? 'Guardando...' : '🔐 Restablecer contraseña' }}
        </button>

      </div>

      <!-- ÉXITO -->
      <div *ngIf="exito" class="exito-container">
        <span class="exito-icono">✅</span>
        <h2>¡Contraseña actualizada!</h2>
        <p>Tu contraseña fue restablecida exitosamente.</p>
        <button class="btn-accion" routerLink="/login">
          Ir al login
        </button>
      </div>

    </div>
  </div>

</div>
