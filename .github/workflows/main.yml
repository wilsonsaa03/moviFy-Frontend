name: Deploy Frontend

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 

    - name: Instalar dependencias y Build
      run: |
        npm install
        npm run build
    - name: Desplegar al VPS vía SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        source: "dist/*" 
        target: "/var/www/ds2/movify"
        strip_components: 1 
        rm: true
